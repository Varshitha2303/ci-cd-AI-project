name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests and save output
        run: npm test > test-output.txt
      - name: AI Test Review
        run: node ai-review.js
      - name: Build Docker Image
        run: docker build -t ci-cd-app .